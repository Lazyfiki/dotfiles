---
- name: The good shit
  become: true
  pacman: name={{ item }} state=latest
  with_items:
    - curl
    - git
    - htop
    - jq
    - node
    - npm
    - python
    - python-pip
    - python-pipx
    - rustup
    - stow
    - tmux
    - tree
    - wget

- name: Setup rustup
  command: rustup default stable
